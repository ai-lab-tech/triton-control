replicaCount: 1

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []
# e.g.
#  - name: image-pull-secret

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  # Default: least privilege in release namespace only.
  clusterWide: false
  # Requires clusterWide=true. Enable only if backend must create/delete namespaces.
  manageNamespaces: false

podAnnotations: {}
podLabels: {}

app:
  image:
    repository: triton-control
    tag: dev-20260505-1847
    pullPolicy: IfNotPresent
  ports:
    frontend: 8080
    backend: 8000
  command: []
  args: []
  env:
    - name: OIDC_CONFIG_SOURCE
      value: "env"
    - name:  OIDC_ENABLED
      value: "false"
    - name: CORS_ORIGINS
      value: "http://localhost:4200,http://127.0.0.1:4200,https://localhost:4200,https://127.0.0.1:4200"
    - name: BACKEND_VERBOSE
      value: "false"
  envFrom: []
  existingSecret: ""
  secretEnv:
    # Set real values in your environment-specific values file.
    SESSION_SECRET: ""
    JWT_SECRET: ""
    S3_SECRET_ENCRYPTION_KEY: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  probes:
    readiness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 20

postgresql:
  enabled: true
  image:
    repository: docker.io/postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  pgdata: /var/lib/postgresql/data/pgdata
  auth:
    database: triton_backend
    username: triton
    password: tritonpw
    existingSecret: ""
  port: 5432
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Connection consumed by the Triton Control backend proxy. Leave serverUrl and
# serviceName empty to derive the Service created by the bundled subchart.
argoIntegration:
  serverUrl: ""
  serviceName: ""
  basePath: /api/workflows/proxy/

# Optional official Argo Workflows subchart. Disabled by default so existing
# Triton Control installations are unchanged until explicitly enabled.
argoWorkflows:
  enabled: false
  # The dependency alias contains an uppercase character. Force an RFC-1123
  # compatible lowercase name for all generated Kubernetes resources.
  fullnameOverride: argo-workflows

  # Argo system images are pulled directly from their public registries.
  # These settings do not configure credentials for images referenced by
  # user-submitted Workflows.
  #
  # On-premise / air-gapped installs: retarget every Argo system image at an
  # internal artifactory by overriding the per-component `image.registry`
  # fields below (controller, executor, server) and `crds.upgradeJob.image`.
  # Only the registry host changes; the upstream repository paths stay the
  # same. For an authenticated artifactory, pre-create a
  # `kubernetes.io/dockerconfigjson` Secret in the release namespace and list
  # it under `images.pullSecrets`.
  images:
    pullPolicy: IfNotPresent
    # Image pull Secrets applied to every Argo system image (controller,
    # executor, server, and the CRD install Job). Reference an existing
    # dockerconfigjson Secret for authenticated artifactory access.
    pullSecrets: []
    # - name: artifactory-pull-secret
    tag: ""

  crds:
    install: true
    keep: true
    # The full Workflow CRD is applied by a one-shot Job that runs a kubectl
    # container. Its image defaults to the public registry.k8s.io. Override the
    # repository (the registry host is baked into the repository string here)
    # to pull from an internal artifactory. Set `full: false` to install
    # minified CRDs without this Job and avoid the extra image pull entirely.
    upgradeJob:
      image:
        repository: registry.k8s.io/kubectl
        tag: v1.36.2

  # Do not create the optional aggregate ClusterRoles (view/edit/admin).
  # Triton Control runs Argo in a single namespace and does not need them.
  createAggregateRoles: false

  # Run Argo Server, controller, workflow RBAC, and Workflow pods only in the
  # Triton Control Helm release namespace.
  singleNamespace: true

  workflow:
    namespace: ""
    serviceAccount:
      create: true
      createSecret: false
      name: argo-service-account
      pullSecrets: []
      annotations:
        workflows.argoproj.io/rbac-rule: "true"
        workflows.argoproj.io/rbac-rule-precedence: "0"
    rbac:
      create: true

  controller:
    image:
      # Override `registry` to pull from an internal artifactory mirror.
      registry: quay.io
      repository: argoproj/workflow-controller
      tag: ""
    securityContext:
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    workflowDefaults:
      spec:
        # Workflow pods need their ServiceAccount token so the Argo executor
        # can create/patch workflowtaskresults. Keep this explicit instead of
        # relying on Kubernetes' default automount behavior.
        podSpecPatch: |
          automountServiceAccountToken: true
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        serviceAccountName: argo-service-account
        templateDefaults:
          container:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    workflowNamespaces: []
    clusterWorkflowTemplates:
      enabled: false

  executor:
    image:
      # Override `registry` to pull from an internal artifactory mirror.
      registry: quay.io
      repository: argoproj/argoexec
      tag: ""
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

  mainContainer:
    imagePullPolicy: IfNotPresent
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

  server:
    enabled: true
    baseHref: /api/workflows/proxy/
    authModes:
      - server
    image:
      # Override `registry` to pull from an internal artifactory mirror.
      registry: quay.io
      repository: argoproj/argocli
      tag: ""
    revisionHistoryLimit: 2
    securityContext:
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    # Argo Server exposes HTTP internally; external TLS terminates at the
    # Triton Control ingress/proxy.
    secure: false
    serviceType: ClusterIP
    servicePort: 2746
    clusterWorkflowTemplates:
      enabled: false

service:
  type: ClusterIP
  frontendPort: 8080
  backendPort: 8000

ingress:
  enabled: true
  className: nginx
  proxyBodySize: 256m
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

  hosts:
    - host: #triton-control.ai-lab-tech.com
      paths:
        frontend:
          - path: /
            pathType: Prefix
        backend:
          - path: /api
            pathType: Prefix
          - path: /auth
            pathType: Prefix
          - path: /login
            pathType: Prefix
          - path: /logout
            pathType: Prefix
          - path: /whoami
            pathType: Prefix
  tls: []
  # Example:
  # tls:
  #   - secretName: triton-control-tls
  #     hosts:
  #       - triton-control.example.com

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext: {}
# e.g.
#   runAsNonRoot: true
#   seccompProfile:
#     type: RuntimeDefault 
securityContext: {}
# e.g.
#   runAsUser: 10001
#   runAsGroup: 10001
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop:
#       - ALL

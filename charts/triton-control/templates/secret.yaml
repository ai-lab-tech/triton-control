{{- if and (not .Values.app.existingSecret) .Values.app.secretEnv }}
{{- $secretName := printf "%s-app" (include "triton-control.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "triton-control.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.app.secretEnv }}
  {{- $existingValue := "" -}}
  {{- if and $existing $existing.data (hasKey $existing.data $key) -}}
    {{- $existingValue = (index $existing.data $key | b64dec) -}}
  {{- end -}}
  {{- $resolved := $value -}}
  {{- if not $resolved -}}
    {{- $resolved = $existingValue -}}
  {{- end -}}
  {{- if not $resolved -}}
    {{- $resolved = randAlphaNum 64 -}}
  {{- end }}
  {{ $key }}: {{ $resolved | quote }}
  {{- end }}
{{- end }}

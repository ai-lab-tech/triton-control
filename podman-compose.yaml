services:
  triton-control:
    image: localhost/triton-control:compose
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://triton:tritonpw@postgres:5432/triton_backend
      OIDC_CONFIG_SOURCE: env
      OIDC_ENABLED: "false"
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,https://localhost:8080,https://127.0.0.1:8080,http://localhost:4200,http://127.0.0.1:4200,https://localhost:4200,https://127.0.0.1:4200
      CLIENT_MAX_BODY_SIZE: 256m
      SESSION_SECRET: change-me-compose-session
      JWT_SECRET: change-me-compose-jwt
      S3_SECRET_ENCRYPTION_KEY: change-me-compose-s3
    ports:
      - "8080:8080"
      - "8000:8000"
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: triton_backend
      POSTGRES_USER: triton
      POSTGRES_PASSWORD: tritonpw
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - triton_control_pgdata:/var/lib/postgresql/data:Z
    healthcheck:
      test: "pg_isready -U triton -d triton_backend"
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  triton_control_pgdata:

networks:
  default:
    name: triton-control

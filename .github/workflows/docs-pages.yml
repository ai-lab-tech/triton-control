name: Docs Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN_AVAILABLE: ${{ secrets.PAGES_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict

      - name: Check Pages setup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1; then
            exit 0
          fi

          if [ "${PAGES_TOKEN_AVAILABLE}" = "true" ]; then
            exit 0
          fi

          echo "::error::GitHub Pages is not enabled for this repository. Set Settings -> Pages -> Build and deployment -> Source to GitHub Actions, then rerun this workflow. To let the workflow enable Pages automatically, add a PAGES_TOKEN repository secret with Pages write access."
          exit 1

      - name: Configure Pages
        if: ${{ env.PAGES_TOKEN_AVAILABLE != 'true' }}
        uses: actions/configure-pages@v5

      - name: Configure Pages with enablement
        if: ${{ env.PAGES_TOKEN_AVAILABLE == 'true' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

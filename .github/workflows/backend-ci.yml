name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "triton-backend/**"
      - "triton-frontend/openapi/triton-backend/openapi.json"
      - "Dockerfile"
      - "compose.yaml"
      - "podman-compose.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "triton-backend/**"
      - "triton-frontend/openapi/triton-backend/openapi.json"
      - "Dockerfile"
      - "compose.yaml"
      - "podman-compose.yaml"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo ghcr.io/gitleaks/gitleaks:latest detect --no-git --source . --redact --verbose

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: triton-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

      - name: Check OpenAPI specs are current
        run: |
          python scripts/export_openapi.py

          FRONTEND_SPEC="../triton-frontend/openapi/triton-backend/openapi.json"

          python - <<'PY'
          import json
          from pathlib import Path

          backend = json.loads(Path("openapi.json").read_text(encoding="utf-8"))
          frontend = json.loads(Path("../triton-frontend/openapi/triton-backend/openapi.json").read_text(encoding="utf-8"))
          if backend != frontend:
              raise SystemExit(
                  "Frontend OpenAPI spec copy is stale. Run python scripts/export_openapi.py, "
                  "copy triton-backend/openapi.json to triton-frontend/openapi/triton-backend/openapi.json, "
                  "then regenerate the frontend client."
              )
          PY

          git diff --exit-code -- openapi.json "$FRONTEND_SPEC" || {
            echo "::error::Checked-in OpenAPI spec is stale. Run python scripts/export_openapi.py and commit the result."
            exit 1
          }

      - name: Run unit tests
        run: |
          coverage run -m unittest discover -s tests -p "test_*.py" -v
          coverage report --fail-under=75
          python scripts/coverage_summary.py

      - name: Run mypy
        run: mypy app/ tests/ scripts/ main.py

      - name: Run ruff
        run: ruff check app/ main.py

      - name: Run import-linter
        run: lint-imports

      - name: Run bandit
        run: bandit -r app/ main.py

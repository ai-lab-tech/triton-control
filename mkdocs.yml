site_name: Triton Control
site_description: Documentation for the Triton Control frontend, backend, and deployment workflows.
repo_url: https://github.com/
theme:
  name: material
  logo: assets/images/triton-control-icon.svg
  favicon: assets/images/triton-control-icon.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Product:
    - User Guide: user-guide.md
    - User Management: user-management.md
  - Architecture:
    - Overview: architecture-overview.md
    - Backend Components: architecture-backend-components.md
    - Model Config Validation: model-config-validation.md
  - Operations:
    - Configuration: configuration.md
    - Deployment: deployment.md
    - Security: security.md
    - Troubleshooting: troubleshooting.md
  - Reference:
    - API: api.md
  - Project:
    - Roadmap: roadmap.md
    - Development: development.md
  - Operations:
    - Configuration: configuration.md
    - Deployment: deployment.md
    - Security: security.md
    - Troubleshooting: troubleshooting.md
  - Reference:
    - API: api.md
  - Project:
    - Roadmap: roadmap.md
    - Development: development.md

markdown_extensions:
  - admonition
  - meta
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

extra_css:
  - assets/stylesheets/home-nav.css
